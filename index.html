<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORNELLA DINA DELIA</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
body {
    margin: 0;
    background: #F8F5F1;
    color: #1a1a1a;
    font-family: "Sora", sans-serif;
    border: 12px solid #E6D99C; 
    min-height: 100vh;
    box-sizing: border-box;
}

/* NAVBAR - Fixed height 45px and visible dropdown */
.navbar {
    width: 100%;
    height: 45px;
    background-color: #FFFCEF;
    padding: 0 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-sizing: border-box;
    z-index: 10000;
    overflow: visible; 
}

.logo { font-size: 18px; font-weight: 600; letter-spacing: 1px; }
.nav-links { display: flex; gap: 40px; font-size: 14px; letter-spacing: 0.5px; height: 100%; align-items: center; }
.nav-item { cursor: pointer; text-decoration: none; color: #1a1a1a; position: relative; height: 100%; display: flex; align-items: center; }

/* DROPDOWN - Fixed positioning to sit under "Projects" */
.dropdown {
    position: absolute;
    top: 45px; 
    left: 0;
    background: #F8F5F1;
    border: 2px solid #c0a880;
    padding: 15px;
    display: none;
    flex-direction: column;
    gap: 12px;
    min-width: 180px;
    z-index: 10001;
}
.nav-item:hover .dropdown { display: flex; }
.dropdown a { text-decoration: none; color: #1a1a1a; font-size: 14px; }

/* HERO */
.hero { position: relative; width: 100%; height: 60vh; overflow: hidden; }
.hero-img { width: 100%; height: 100%; object-fit: cover; display: block; }

.hero-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(77, 58, 64, 0.15); 
    z-index: 1;
}

.hero-text {
    position: absolute;
    top: 50%;
    left: 10%; 
    transform: translateY(-50%);
    z-index: 2;
    color: #FFFCEF;
    text-align: left;
}
.hero-text h1 { font-size: 64px; font-weight: 300; margin: 0; }
.hero-text p { font-size: 16px; opacity: 0.9; margin-top: 10px; }

/* CONTAINER & GRID */
.container { max-width: 1100px; margin: 0 auto; padding: 100px 24px; }
.section-title { margin: 120px 0 40px; font-size: 12px; letter-spacing: 2px; opacity: 0.5; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 28px; }
.project { position: relative; overflow: hidden; border-radius: 12px; aspect-ratio: 525 / 409; background: #fff; border: 1px solid rgba(0,0,0,0.08); text-decoration: none; color: inherit; transition: 0.3s ease; }
.project img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s ease; }
.project:hover { transform: translateY(-4px); border-color: rgba(0,0,0,0.2); }
.project:hover img { transform: scale(1.03); }

/* LABELS */
.label { position: absolute; bottom: 14px; left: 14px; font-size: 13px; background: rgba(248,245,241,0.9); padding: 8px 12px; border-radius: 6px; }
.label span { display: block; font-size: 10px; opacity: 0.6; text-transform: uppercase; margin-bottom: 2px; }

</style>
</head>

<body>

<div class="navbar">
    <div class="logo">✦ ORNELLA DINA DELIA</div>
    <div class="nav-links">
        <div class="nav-item">Projects
            <div class="dropdown">
                <a href="project-aethel.html">Aethel</a>
                <a href="project-haven.html">Haven</a>
                <a href="project-illumix.html">Illumix</a>
                <a href="project-moonhive.html">MoonHive</a>
            </div>
        </div>
        <a class="nav-item" href="#">Gallery</a>
        <a class="nav-item" href="about.html">About</a>
    </div>
</div>

<div class="hero">
    <div class="hero-overlay"></div>
    <img class="hero-img" src="lemonhero.png">
    <div class="hero-text">
        <h1>Ornella Dina D’elia</h1>
        <p>UI/UX Designer • Visual Storyteller • Creative Developer</p>
    </div>
</div>

<div class="container">
    <div class="section-title">SELECTED WORK</div>
    <div class="grid">
        <a href="project-aethel.html" class="project">
            <img src="Untitled.jpg">
            <div class="label"><span>UI/UX</span> AETHEL</div>
        </a>
        <a href="project-haven.html" class="project">
            <img src="havenpackageforgirl.png">
            <div class="label"><span>Branding/ Packaging</span> HAVEN</div>
        </a>
        <a href="project-moonhive.html" class="project">
            <img src="businesscardmoonhive.png">
            <div class="label"><span>Branding/ Web Design</span> MOONHIVE</div>
        </a>
        <a href="project-illumix.html" class="project">
            <img src="illumixcover.png">
            <div class="label"><span>UI/ Web Design</span> ILLUMIX</div>
        </a>
    </div>
</div>

</body>
</html>
