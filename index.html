/* GLOBAL - Added border to the whole website */
body {
    margin: 0;
    background: #F8F5F1;
    color: #1a1a1a;
    font-family: 'Inter', sans-serif;
    border: 8px solid #E5DCC5; /* Matching the border from your screenshot */

    box-sizing: border-box;
}

/* NAVBAR - Positioned to top right */
.navbar {
    position: absolute;
    top: 30px;
    right: 40px;
    display: flex;
    gap: 30px;
    font-size: 14px;
    letter-spacing: 0.5px;
    z-index: 10000;
}

.nav-item {
    cursor: pointer;
    text-decoration: none;
    color: #1a1a1a;
}

/* DROPDOWN - Updated styles */
.dropdown {
    position: absolute;
    top: 25px;
    right: 0;
    background: #F8F5F1;
    border: 1px solid #c0a880;
    padding: 15px;
    display: none;
    flex-direction: column;
    gap: 12px;
    min-width: 180px;
}

.nav-item:hover .dropdown {
    display: flex;
}

.dropdown a {
    text-decoration: none;
    color: #1a1a1a;
    font-size: 14px;
}

/* HERO - Adjusted positioning */
.hero {
    position: relative;
    width: 100%;
    height: 60vh;
    margin-top: 80px;
    padding: 0 40px;
    box-sizing: border-box;
}

.hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.hero-text {
    position: absolute;
    top: 30%;
    left: 80px;
    text-align: left;
}

.hero-text h1 {
    font-size: 80px;
    font-weight: 400;
    margin: 0;
    line-height: 0.9;
    color: white;
}

.hero-text p {
    font-size: 18px;
    background: rgba(255,255,255,0.3);
    display: inline-block;
    padding: 10px 20px;
    border-radius: 30px;
    margin-top: 20px;
    color: white;
