<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ornella Dina D'Elia</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #F8F5F1;
    color: #1a1a1a;
    font-family: 'Inter', sans-serif;
}

/* container */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 100px 24px;
}

/* HERO IMAGES */
.hero-img {
    width: 100%;
    height: 416px;
    object-fit: cover;
    border-radius: 12px;
}

.hero-img.second {
    height: 554px;
    margin-top: 20px;
}

/* HERO TEXT */
.hero-text {
    margin-top: 40px;
}

.hero-text h1 {
    font-size: 64px;
    font-weight: 300;
    margin: 0;
}

.hero-text p {
    opacity: 0.65;
    max-width: 520px;
    margin-top: 10px;
}

/* SECTION TITLE */
.section-title {
    margin: 120px 0 40px;
    font-size: 12px;
    letter-spacing: 2px;
    opacity: 0.5;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 28px;
}

/* PROJECT */
.project {
    position: relative;
    overflow: hidden;
    border-radius: 12px;
    aspect-ratio: 525 / 409;
    background: #fff;
    border: 1px solid rgba(0,0,0,0.08);
    text-decoration: none;
    color: inherit;
    transition: 0.3s ease;
}

.project img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.4s ease;
}

.project:hover {
    transform: translateY(-4px);
    border-color: rgba(0,0,0,0.2);
}

.project:hover img {
    transform: scale(1.03);
}

.label {
    position: absolute;
    bottom: 14px;
    left: 14px;
    font-size: 13px;
    background: rgba(248,245,241,0.75);
    padding: 6px 10px;
    border-radius: 6px;
}

/* ABOUT */
.text {
    max-width: 600px;
    opacity: 0.75;
    line-height: 1.7;
    font-size: 15px;
}

/* FOOTER (DARK) */
.footer {
    margin-top: 120px;
    background: #111;
    color: #fff;
    padding: 60px 24px;
}

.footer-inner {
    max-width: 1100px;
    margin: auto;
    opacity: 0.8;
    font-size: 14px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .grid {
        grid-template-columns: 1fr;
    }

    .hero-img {
        height: 300px;
    }

    .hero-img.second {
        height: 420px;
    }

    .hero-text h1 {
        font-size: 40px;
    }
}
</style>

</head>

<body>

<div class="container">

<!-- HERO IMAGES -->
<img class="hero-img" src="hero.jpg" alt="Hero Image">
<img class="hero-img second" src="hero2.jpg" alt="Hero Image 2">

<!-- HERO TEXT -->
<div class="hero-text">
    <h1>Ornella Dina D’Elia</h1>
    <p>UI/UX Designer • Visual Storyteller • Creative Developer</p>
</div>

<!-- PROJECTS -->
<div class="section-title">SELECTED WORK</div>

<div class="grid">

    <a href="project-aethel.html" class="project">
        <img src="Untitled.jpg">
        <div class="label">AETHEL</div>
    </a>

    <a href="project-haven.html" class="project">
        <img src="havenpackageforgirl.png">
        <div class="label">HAVEN</div>
    </a>

    <a href="project-moonhive.html" class="project">
        <img src="businesscardmoonhive.png">
        <div class="label">MOONHIVE</div>
    </a>

    <a href="project-illumix.html" class="project">
        <img src="illumixcover.png">
        <div class="label">ILLUMIX</div>
    </a>

</div>

<!-- ABOUT -->
<div class="section-title">ABOUT</div>
<p class="text">
I am a designer focused on crafting immersive digital experiences through minimal and futuristic visual systems.
</p>

</div>

<!-- FOOTER -->
<div class="footer">
    <div class="footer-inner">
        © 2026 Ornella D’Elia — UI/UX Designer
    </div>
</div>

</body>
</html>
