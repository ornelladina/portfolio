<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Study: Profix Website</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">

<style>

/* GLOBAL — matches index.html / about.html */
body {
    margin: 0;
    background: #F8F5F1;
    color: #1a1a1a;
    font-family: "Sora", sans-serif;
    border: 12px solid #E6D99C;
    min-height: 100vh;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
}

/* NAVBAR (shared look — burger behavior lives in header.html) */
.navbar {
    width: 100%;
    height: 45px;
    background-color: #FFFCEF;
    padding: 0 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-sizing: border-box;
    z-index: 10000;
    overflow: visible;
}
.logo { font-size: 16px; font-weight: 130; letter-spacing: 1px; white-space: nowrap; }
.nav-links { display: flex; gap: 40px; font-size: 14px; font-weight: 130; letter-spacing: 0.5px; height: 100%; align-items: center; }
.nav-item { cursor: pointer; text-decoration: none; color: #1a1a1a; position: relative; height: 100%; display: flex; align-items: center; white-space: nowrap; }

.dropdown {
    position: absolute;
    top: 45px;
    left: 50%;
    transform: translateX(-50%);
    background: #FFFCEF;
    border: 2px solid #E6D99C;
    padding: 10px;
    display: none;
    flex-direction: column;
    gap: 8px;
    min-width: 160px;
    z-index: 10001;
    border-radius: 4px;
}
.nav-item:hover .dropdown { display: flex; }
.dropdown a {
    text-decoration: none;
    color: #1a1a1a;
    font-size: 14px;
    padding: 6px 10px;
    border-radius: 4px;
    transition: 0.3s ease;
}
.dropdown a:hover { background-color: #E6D99C; color: #FFFCEF; }

/* FOOTER (shared look) */
.footer { padding: 60px 40px; display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid #E6D99C; background: #F8F5F1; box-sizing: border-box; }
.footer-col h4 { font-size: 14px; text-transform: uppercase; margin-bottom: 20px; }
.footer-col a { display: block; color: #1a1a1a; text-decoration: none; margin-bottom: 10px; font-size: 14px; }
.social-icons { display: flex; gap: 15px; align-items: center; }

/* PAGE CONTENT — empty placeholder for now */
.page-content {
    flex: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 70px 24px 80px;
    width: 100%;
    box-sizing: border-box;
}

@media (max-width: 768px) {
  body { border-width: 8px; }
  .navbar { padding: 0 16px; }
  .logo { font-size: 12px; }
  .footer { grid-template-columns: 1fr; gap: 32px; padding: 40px 24px; }
}

</style>
</head>

<body>

{% include header.html %}

<div class="page-content">
    <!-- Build the Profix case study content here -->
</div>

{% include footer.html %}

</body>
</html>
