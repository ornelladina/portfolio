<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haven Project | Ornella Dina Delia</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">
<style>
    body { margin: 0; background: #F8F5F1; color: #1a1a1a; font-family: "Sora", sans-serif; border: 12px solid #E6D99C; min-height: 100vh; display: flex; flex-direction: column; }

    /* FIX 1: Section 3 Alignment - Using Flexbox for consistent rows */
    .section-3-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 20px;
    }

    /* FIX 2: Section 4 Label Images - Ensuring they are sized properly */
    .label-image {
        width: 100%;
        max-width: 200px; /* Adjust this size as needed */
        height: auto;
        display: block;
    }

    /* FIX 3: Gallery Section - Zoom out images to show full content */
    .gallery-image {
        width: 100%;
        height: 300px; 
        object-fit: contain; /* This prevents the 'zoomed in' look */
        background-color: #F8F5F1;
    }

    .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        padding: 20px;
    }
</style>
</head>
<body>

    <!-- Section 3: Brand Elements -->
    <div class="section-3-row">
        <div>Brand Essence</div>
        <div>Packaging Details</div>
        <div>System Reveal</div>
    </div>

    <!-- Section 4: Labels -->
    <div class="section-3-row">
        <img src="label1.jpg" class="label-image" alt="Label 1">
        <img src="label2.jpg" class="label-image" alt="Label 2">
        <img src="label3.jpg" class="label-image" alt="Label 3">
    </div>

    <!-- Gallery Section -->
    <div class="gallery-grid">
        <img src="girl-card.jpg" class="gallery-image" alt="Girl Card">
        <img src="boy-card.jpg" class="gallery-image" alt="Boy Card">
    </div>

</body>
</html>
