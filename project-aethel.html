<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHEL Project</title>
    <!-- Importing Fonts from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Inter:wght@400&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Base Styles */
        body { margin: 0; padding: 0; background-color: #2A1818; color: #EAE3D5; font-family: 'Sora', sans-serif; }
        .logo { font-family: 'Cinzel', serif; font-size: 2rem; letter-spacing: 2px; }
        .text-font { font-family: 'Inter', sans-serif; }
        
        /* Section Layouts */
        section { padding: 50px 20px; text-align: center; }
        
        /* Hero Section */
        .hero { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        /* Section with background image */
        .bg-image-section { 
            background: url('your-background-image.jpg') no-repeat center center; 
            background-size: cover; 
            min-height: 400px;
        }

        /* Section 4: Solid color with image */
        .solid-color-section { background-color: #2A1818; padding: 100px 20px; }
        .content-box { background-color: #EAE3D5; padding: 20px; display: inline-block; }
    </style>
</head>
<body>

    <!-- Hero Section -->
    <section class="hero">
        <img src="hero-main.jpg" alt="Aethel Hero" style="max-width: 100%; height: auto;">
        <div class="logo">AETHEL</div>
        <p class="text-font">The Art of Curated Luxury</p>
    </section>

    <!-- Section 2: Background Image -->
    <section class="bg-image-section">
        <h2>Collection Overview</h2>
    </section>

    <!-- Section 4: Solid color with image -->
    <section class="solid-color-section">
        <div class="content-box">
            <img src="product-example.jpg" alt="Product" style="max-width: 300px;">
        </div>
    </section>

</body>
</html>
